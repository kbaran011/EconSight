name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: mypy src/econsight

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: econsight
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Init database schema
        env:
          DB_URL: postgresql://postgres:password@localhost:5432/econsight
        run: python -c "import asyncio; from econsight.db.connection import init_db; asyncio.run(init_db())"
      - name: Run unit + integration tests
        env:
          DB_URL: postgresql://postgres:password@localhost:5432/econsight
        run: pytest -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc -b
      - run: npx eslint src/
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env.docker for CI
        run: |
          cat > .env.docker <<'EOF'
          POSTGRES_PASSWORD=ci_password
          GROQ_API_KEY=
          AUTO_SEED=false
          AUTO_SEED_MODELS=false
          EOF
      - name: Build and start stack
        run: |
          docker compose --env-file .env.docker build
          docker compose --env-file .env.docker up -d
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/api/ping; then exit 0; fi
            sleep 5
          done
          docker compose logs
          exit 1
      - name: Smoke test status endpoint
        run: curl -sf http://localhost/api/status | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['seeding_status'] in ('idle','ready')"
      - name: Tear down
        if: always()
        run: docker compose down -v
