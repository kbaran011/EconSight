<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Jade background -->
  <rect width="32" height="32" rx="6" fill="#1a7a55"/>
  <!-- Thin parchment inner border for editorial feel -->
  <rect x="2.5" y="2.5" width="27" height="27" rx="4" fill="none" stroke="#f5f0e8" stroke-width="0.75" opacity="0.25"/>
  <!-- Serif "ES" monogram -->
  <text x="16" y="19.5" text-anchor="middle" font-size="13" font-weight="700"
        font-family="Georgia, 'Times New Roman', serif" fill="#f5f0e8" letter-spacing="-0.3">ES</text>
  <!-- Brick red rule — newspaper masthead style -->
  <rect x="6" y="23.5" width="20" height="2" rx="1" fill="#c9483a"/>
</svg>
